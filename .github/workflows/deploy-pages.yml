name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_CLIENT_ID }}" ] || [ -z "${{ secrets.GOOGLE_SPREADSHEET_ID }}" ]; then
            echo "Missing GOOGLE_CLIENT_ID or GOOGLE_SPREADSHEET_ID repository secrets."
            exit 1
          fi

      - name: Write production environment
        run: |
          cat > src/environments/environment.ts <<'EOF'
          export const environment = {
            googleClientId: '${{ secrets.GOOGLE_CLIENT_ID }}',
            spreadsheetId: '${{ secrets.GOOGLE_SPREADSHEET_ID }}',
            sheetsScope: 'https://www.googleapis.com/auth/spreadsheets'
          };
          EOF

      - name: Build
        run: npm run build:github-pages

      - name: Add SPA fallback
        run: cp dist/cocina-trece/browser/index.html dist/cocina-trece/browser/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cocina-trece/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
